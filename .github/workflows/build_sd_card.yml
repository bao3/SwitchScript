name: Nintendo Switch SD Card Automated Builder

on:
  schedule:
    # 每天北京时间凌晨 01:13 运行（对应 UTC 时间前一天下午 17:13）
    # 采用 13分 错开国际整点排队高峰，大幅缩短 GitHub Actions 分配服务器的等待时间
    - cron: '13 17 * * *'
  workflow_dispatch: # 开启手动触发通道，允许在 GitHub 网页端 Actions 页面一键点击运行

# 显式声明全局安全上下文权限，赋予 Workflow 能够修改仓库代码（Push）以及创建 Release 的最高写权限
permissions:
  contents: write
  actions: write

jobs:
  build-sd-layout:
    runs-on: ubuntu-latest

    steps:
      # 第一步：检出仓库代码
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true # 保持认证凭证，供后续 Git Push 阶段使用

      # 第二步：初始化系统依赖环境（由于 Bash 脚本内含自动安装 jq 机制，此步作为双重保险）
      - name: Initialize Environment Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip curl

      # 第三步：执行核心构建脚本
      # 在原生 GitHub Actions 环境中，${{ secrets.GITHUB_TOKEN }} 会被自动无缝注入
      - name: Execute Core Switch Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./switchScript.sh
          ./switchScript.sh

      # 第四步：在云端将生成的文件夹压缩为 zip 包，准备用于 Release 发布
      - name: Compress SD Card Folder
        run: |
          if [ -d "./NS SD Card" ]; then
            cd "./NS SD Card"
            # 将目录下的所有内容打包为 NS-SD-Card-Structure.zip
            zip -r ../NS-SD-Card-Structure.zip ./*
            cd ..
            echo "==> Success: Folder compressed into NS-SD-Card-Structure.zip"
          else
            echo "Error: Target directory './NS SD Card' not found!"
            exit 1
          fi

      # 第五步：自动创建/覆盖更新仓库的 GitHub Release (latest)
      # 每次运行都会将最新的压缩包推送到你仓库的 Releases 页面中，并固定命名为 latest
      - name: Update GitHub Release (latest)
        uses: ncipollo/release-action@v1
        with:
          artifacts: "NS-SD-Card-Structure.zip" # 要发布的文件
          tag: "latest"                           # 固定的 Release 标签
          name: "Nintendo Switch SD Card Latest Build"
          body: |
            Automated build generated on $(date -u +"%Y-%m-%d %H:%M:%S UTC").
            Contains latest integration of Atmosphere, Hekate, Sigpatches, and sys-modules.
          allowUpdates: true                      # 允许覆盖已有版本
          removeArtifacts: true                   # 覆盖时移除旧文件
          replacesArtifacts: true                 # 替换同名资产文件
          makeLatest: true                        # 强制将其设为仓库的最新的 Release
          token: ${{ secrets.GITHUB_TOKEN }}

      # 第六步：自动化“内核续命”防御机制（彻底解决 60 天无 Commit 导致自动化暂停的痛点）
      # 原理：每次脚本成功跑完，都会强制更新本地的一个时间戳文件并自动 Push 推送回仓库。
      # 从而在 GitHub 看来，该仓库永远处于活跃迭代状态，实现 Actions 永久不灭。
      - name: Automated Keep-Alive Self-Commit
        run: |
          # 向防休眠标记文件写入当前运行时的标准 ISO 时间戳
          date -u +"%Y-%m-%d %H:%M:%S UTC" > .github/workflow_keep_alive.txt
          
          # 检查文件是否确实发生了变化，避免无意义的重复 Commit 报错
          if ! git diff --exit-code .github/workflow_keep_alive.txt; then
            echo "==> Detection: Repository freeze detected. Initiating keep-alive deployment..."
            
            # 配置 GitHub 官方 Actions 机器人的全局身份
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            
            # 暂存并提交变更
            git add .github/workflow_keep_alive.txt
            
            # [skip ci] 极为关键：它指示 GitHub 在接受此 Commit 时，绝对不要再次引发循环构建
            git commit -m "chore: workflow auto-maintenance heartbeat [skip ci]"
            
            # 推送回主分支
            git push origin HEAD:${{ github.ref_name }}
            echo "==> Success: Heartbeat pushed successfully. Action cooling-off period refreshed."
          else
            echo "==> Notice: No modification tracked. Skipping keep-alive execution."
          fi
