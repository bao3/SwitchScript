name: Auto Build Switch SD Card Package

on:
  schedule:
    # 每天北京时间 01:00 (UTC 17:00) 自动触发
    - cron: '23 17 * * *'
  workflow_dispatch:
    # 允许在 GitHub 网页上手动点击按钮立即触发构建

# 赋予工作流可以给仓库 Release 写入文件的硬性权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Environment Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq unzip

      - name: Make Script Executable
        run: chmod +x ./switchScript.sh

      - name: Run Switch Build Script
        # 【关键修复】：将本地生成的秘钥以环境变量形式喂给内部的 Shell 脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./switchScript.sh

      - name: Create Zip Archive
        run: |
          cd "NS SD Card"
          zip -r ../NS_SD_Card.zip ./*
          cd ..

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Switch SD Pack (${{ github.event.schedule && 'Scheduled' || 'Manual' }})"
          body: |
            这是每日自动生成的最新 Nintendo Switch CFW 整合包。
            包含最新的 Hekate, Atmosphere, Sigpatches, 常用工具插件及自定义配置文件。
            
            **最近构建时间**: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false
          make_latest: "true"
          files: |
            NS_SD_Card.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep Workflow Alive (Auto Commit)
      run: |
        # 检查距离上一次非 Bot 提交或当前活跃状态，或者干脆每次运行/隔几周运行一次
        # 这里演示每次运行成功后，都向 keep_alive.txt 写入当前时间戳
        date > keep_alive.txt
        
        # 检查文件是否有变动，如果有变动则提交（防止无意义报错）
        if ! git diff --exit-code keep_alive.txt; then
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add keep_alive.txt
          git commit -m "chore: keep workflow alive via auto-timestamp [skip ci]"
          git push
        fi      
