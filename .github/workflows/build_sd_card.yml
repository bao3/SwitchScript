name: Auto Build Switch SD Card Package

on:
  schedule:
    # 每天北京时间 01:00 (UTC 17:00) 自动触发
    - cron: '0 17 * * *'
  workflow_dispatch:
    # 允许在 GitHub 网页上手动点击按钮立即触发构建

# 核心权限：必须显式声明允许工作流写入仓库内容（用于发布 Release）
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Environment Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq unzip

      - name: Make Script Executable
        run: chmod +x ./switchScript.sh

      - name: Run Switch Build Script
        run: ./switchScript.sh

      - name: Create Zip Archive
        run: |
          cd "NS SD Card"
          zip -r ../NS_SD_Card.zip ./*
          cd ..

      - name: Upload to GitHub Release
        # 使用 softprops/action-gh-release 动作
        uses: softprops/action-gh-release@v2
        with:
          # 固定的 Tag 名字，每天运行都会覆盖这个 Tag 的内容
          tag_name: latest
          # Release 的标题，这里加入了动态日期，方便在主页一眼看出更新时间
          name: "Latest Switch SD Pack (${{ github.event.schedule && 'Scheduled' || 'Manual' }})"
          # 发布页面的正文描述
          body: |
            这是每日自动生成的最新 Nintendo Switch CFW 整合包。
            包含最新的 Hekate, Atmosphere, Sigpatches, 以及各种常用工具插件。
            
            **构建时间**: ${{ github.event.repository.updated_at }}
          # 设定为非草稿、非预发布
          draft: false
          prerelease: false
          # 核心参数：当最新版运行时，自动覆盖并替换已经存在的同名 Tag 和 Assets
          make_latest: "true"
          # 需要上传的资产文件路径
          files: |
            NS_SD_Card.zip
        env:
          # GitHub Actions 内部自动生成的临时安全凭证，无需手动去 Settings 配置 Secret
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
